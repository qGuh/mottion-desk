<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 64" width="240" height="64">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6c5ce7"/>
      <stop offset="100%" stop-color="#00cec9"/>
    </linearGradient>
    <linearGradient id="txtGrad" x1="80" y1="0" x2="240" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6c5ce7"/>
      <stop offset="100%" stop-color="#00cec9"/>
    </linearGradient>
  </defs>

  <!-- Icon background -->
  <rect width="64" height="64" rx="16" fill="url(#bgGrad)"/>

  <!-- Motion trail (ghost M) -->
  <path d="M15 52 L15 18 L32 38 L52 18 L52 52"
        stroke="white" stroke-width="6" fill="none"
        stroke-linecap="round" stroke-linejoin="round"
        opacity="0.12"/>

  <!-- Main M -->
  <path d="M12 52 L12 18 L32 38 L52 18 L52 52"
        stroke="white" stroke-width="6" fill="none"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Wordmark: Mottion -->
  <text x="80" y="36"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
        font-weight="800" font-size="28" letter-spacing="-0.8"
        fill="url(#txtGrad)">Mottion</text>

  <!-- Wordmark: Desk -->
  <text x="83" y="54"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
        font-weight="500" font-size="13" letter-spacing="3"
        fill="rgba(255,255,255,0.45)">DESK</text>
</svg>
